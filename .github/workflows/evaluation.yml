name: CI/CD for Evaluation Service

on:
  workflow_dispatch:

env:
  SERVICE_NAME: evaluation-service
  GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}

jobs:
  build-test-security:
    name: Build + Test + Lint + Security
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.SERVICE_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.SERVICE_NAME }}/go.mod

      # -----------------------------
      # 1. BUILD & UNIT TEST
      # -----------------------------
      - name: Download dependencies
        run: go mod tidy

      - name: Build
        run: go build -v ./...

      - name: Run Unit Tests
        run: go test -v ./...

      # -----------------------------
      # 2. LINTER
      # -----------------------------
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: ${{ env.SERVICE_NAME }}
          version: latest

      # -----------------------------
      # 3. SCA - Dependency Scan
      # -----------------------------
      - name: Run Trivy (SCA - Filesystem)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scan-ref: ./${{ env.SERVICE_NAME }}
          severity: 'CRITICAL'
          exit-code: '1'

      # -----------------------------
      # 4. SAST - Code Scan
      # -----------------------------
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: ./${{ env.SERVICE_NAME }}/...

# ============================================================
#                     DOCKER SECTION
# ============================================================
#                           ##         .
#                     ## ## ##        ==
#                  ## ## ## ## ##    ===
#              /"""""""""""""""""\___/ ===
#         ~~~ {~~ ~~~~ ~~~ ~~~~ ~~ ~ /  ===- ~~~
#              \______ o          __/
#                \    \        __/
#                 \____\______/
# ============================================================

  docker:
    name: Docker Build + Container Scan
    runs-on: ubuntu-latest
    needs: build-test-security

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # 5. Docker Build
      # -----------------------------
      - name: Build Docker Image
        run: |
          IMAGE_NAME=$SERVICE_NAME:${GITHUB_SHA}
          docker build -t $IMAGE_NAME ./$SERVICE_NAME
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      # -----------------------------
      # 6. Container Scan (Trivy)
      # -----------------------------
      - name: Scan Docker Image (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          severity: 'CRITICAL'
          exit-code: '1'
          
      # -----------------------------
      # 7. Configure AWS Credentials
      # -----------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # -----------------------------
      # 8. Login to Amazon ECR
      # -----------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # -----------------------------
      # 9. Tag and Push Docker Image
      # -----------------------------
      - name: Tag and Push Image to ECR
        run: |
          COMMIT_HASH=${GITHUB_SHA::7}

          ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          ECR_REPOSITORY=$SERVICE_NAME

          aws ecr describe-repositories --repository-names $ECR_REPOSITORY --region $AWS_REGION \
          || aws ecr create-repository --repository-name $ECR_REPOSITORY --region $AWS_REGION

          docker tag $IMAGE_NAME $ECR_REGISTRY/$ECR_REPOSITORY:$COMMIT_HASH
          docker tag $IMAGE_NAME $ECR_REGISTRY/$ECR_REPOSITORY:latest

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$COMMIT_HASH
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  gitops:
      name: Update GitOps Manifests
      runs-on: ubuntu-latest
      needs: docker
    
      steps:
        - name: Checkout repository
          uses: actions/checkout@v4
          with:
            # Importante: buscar todo o histórico para evitar erros de push
            fetch-depth: 0
            token: ${{ secrets.GITOPS_TOKEN }}
  
        - name: Update image tag
          run: |
            COMMIT_HASH=${GITHUB_SHA::7}
            FILE_PATH="Helm/togglemaster/values.yaml"
          
            echo "Atualizando imagem do serviço: ${{ env.SERVICE_NAME }}"
            echo "Arquivo: $FILE_PATH"
          
            sed -i "/^${{ env.SERVICE_NAME }}:/,/^[a-zA-Z0-9-]*:/ s|image: .*|image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.SERVICE_NAME }}:$COMMIT_HASH|" $FILE_PATH
          
            echo "Resultado:"
            grep -A 5 "${{ env.SERVICE_NAME }}:" $FILE_PATH
            cat Helm/togglemaster/values.yaml
          
        - name: Commit and Push changes
          run: |        
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
        
            git add Helm/togglemaster/values.yaml
            
            # Só faz commit se houver mudança real
            if git diff --quiet && git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "Update ${{ env.SERVICE_NAME }} image to $COMMIT_HASH"
              # Usando a própria action de checkout autenticada
              git push origin main
            fi
