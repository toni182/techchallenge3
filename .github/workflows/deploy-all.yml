name: Deploy All Services

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # ============================================
      # FUNÇÃO BASE (AUTH)
      # ============================================
      - name: Deploy AUTH
        run: |
          WORKFLOW="auth.yml"

          echo "Triggering $WORKFLOW"

          START_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          curl -s -X POST \
          -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/$WORKFLOW/dispatches \
          -d "{\"ref\":\"${GITHUB_REF_NAME}\"}"

          echo "Waiting run to appear..."

          while true; do
            RUN_ID=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/$WORKFLOW/runs?branch=${GITHUB_REF_NAME}&event=workflow_dispatch" \
              | jq -r --arg START "$START_TIME" '.workflow_runs[] | select(.created_at > $START) | .id' | head -n 1)

            if [ ! -z "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
              break
            fi

            echo "Waiting for correct run..."
            sleep 5
          done

          echo "Run ID: $RUN_ID"

          while true; do
            RESPONSE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID)

            STATUS=$(echo $RESPONSE | jq -r '.status')
            CONCLUSION=$(echo $RESPONSE | jq -r '.conclusion')

            echo "$(date) - AUTH status: $STATUS / $CONCLUSION"

            if [ "$STATUS" == "completed" ]; then
              if [ "$CONCLUSION" != "success" ]; then
                echo "AUTH failed!"
                exit 1
              fi
              break
            fi

            sleep 15
          done

      # ============================================
      # FLAG
      # ============================================
