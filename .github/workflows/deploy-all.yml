name: Deploy All Services

on:
  workflow_dispatch:

jobs:
  deploy:
    name: 🚀 Deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: [auth, flag, targeting, evaluation, analytics]
        include:
          - service: auth
            workflow: "auth.yml"
          - service: flag
            workflow: "flag.yml"
          - service: targeting
            workflow: "targeting.yml"
          - service: evaluation
            workflow: "evaluation.yml"
          - service: analytics
            workflow: "analytics.yml"
      fail-fast: false

    steps:

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Deploy ${{ matrix.service | upper }}
        run: |
          WORKFLOW="${{ matrix.workflow }}"

          echo "Iniciando deploy do serviço: ${{ matrix.service }}"

          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/$WORKFLOW/dispatches \
            -d "{\"ref\":\"${GITHUB_REF_NAME}\"}"

          sleep 10

          RUN_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/$WORKFLOW/runs?per_page=1" \
            | jq -r '.workflow_runs[0].id')

          while true; do
            RESPONSE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID)

            STATUS=$(echo $RESPONSE | jq -r '.status')
            CONCLUSION=$(echo $RESPONSE | jq -r '.conclusion')

            echo "${{ matrix.service | upper }}: $STATUS / $CONCLUSION"

            if [ "$STATUS" == "completed" ]; then
              if [ "$CONCLUSION" != "success" ]; then
                echo "Deploy do serviço ${{ matrix.service }} falhou!"
                exit 1
              fi
              echo "Deploy do serviço ${{ matrix.service }} concluído com sucesso!"
              break
            fi

            sleep 10
          done
