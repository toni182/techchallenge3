name: Deploy All Services

on:
  workflow_dispatch:

jobs:
  trigger-pipelines:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger auth pipeline
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/auth.yml/dispatches \
          -d '{"ref":"main"}'

      - name: Trigger flag pipeline
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/flag.yml/dispatches \
          -d '{"ref":"main"}'

      - name: Trigger targeting pipeline
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/targeting.yml/dispatches \
          -d '{"ref":"main"}'

      - name: Trigger evaluation pipeline
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/evaluation.yml/dispatches \
          -d '{"ref":"main"}'

      - name: Trigger analytics pipeline
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/analytics.yml/dispatches \
          -d '{"ref":"main"}'
