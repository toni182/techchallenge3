{{- range $appName, $appConfig := .Values }}
{{- if and (kindIs "map" $appConfig) (hasKey $appConfig "hpa") }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $appConfig.hpa.name }}
  namespace: {{ $appConfig.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app-{{ $appName }}
  minReplicas: {{ $appConfig.hpa.minReplicas | default 1 }}
  maxReplicas: {{ $appConfig.hpa.maxReplicas | default 3 }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ $appConfig.hpa.targetCPU | default 80 }}
---
{{- end }}
{{- end }}
