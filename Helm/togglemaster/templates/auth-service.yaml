apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: app-auth-service
    {{- include "togglemaster.labels" .| nindent 4 }}
  name: app-auth-service
  namespace: {{ (index .Values "auth-service").namespace }}
spec:
  strategy:
    type: Recreate
  replicas: {{ (index .Values "auth-service").replicas}}
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: app-auth-service
  template:
    metadata:
      labels:
        app: app-auth-service
    spec:
      containers:
        - name: app-auth-service
          image: {{ (index .Values "auth-service").image }}
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          #startupProbe:
          #  httpGet:
          #    path: /health
          #    port: {{ (index .Values "auth-service").port }}
          #  failureThreshold: 180
          #  periodSeconds: 1
          readinessProbe:
            httpGet:
              path: /health
              port: {{ (index .Values "auth-service").port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: {{ (index .Values "auth-service").port }}
            initialDelaySeconds: 180
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: auth-service-db-secret #Credentials to db login and generics
            - secretRef:
                name: auth-service-db-secret-host #Credential to db login (host)