# ----------------------------------------------------------------------
# golangci-lint configuration
#
# This project is part of a DevOps-focused academic environment.
# The goal is to demonstrate CI/CD integration and tooling usage
# rather than enforce strict backend error-handling standards.
#
# The following linters are disabled to avoid requiring refactoring
# of application-layer code that is not the focus of this project:
#
# - errcheck: requires explicit handling of all returned errors
# - staticcheck: flags deprecated packages and advanced code patterns
#
# In a production-grade backend service, these linters should be enabled.
# ----------------------------------------------------------------------

version: "2"

linters:
  disable:
    - errcheck
    - staticcheck