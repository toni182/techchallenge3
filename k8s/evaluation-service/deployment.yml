apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evaluation-service
  template:
    metadata:
      labels:
        app: evaluation-service
    spec:
      containers:
        - name: evaluation-service
          image: 618678798048.dkr.ecr.us-east-1.amazonaws.com/auth-service:c1a64bc
          ports:
            - containerPort: 8004
